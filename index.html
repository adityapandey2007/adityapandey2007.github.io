<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Pandey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #0f172a;
    --text: #ffffff;
    --card: rgba(255,255,255,0.08);
}

.light {
    --bg: #f8fafc;
    --text: #0f172a;
    --card: rgba(0,0,0,0.05);
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
    overflow-x: hidden;
}

/* 🌊 Animated Gradient Background */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 30%, #38bdf8, transparent),
                radial-gradient(circle at 70% 70%, #6366f1, transparent);
    animation: moveBg 10s infinite alternate;
    z-index: -1;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-100px,-100px); }
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    backdrop-filter: blur(12px);
}

nav a {
    color: var(--text);
    margin: 0 10px;
    text-decoration: none;
}

/* Toggle */
.toggle {
    cursor: pointer;
    font-size: 20px;
}

/* Hero */
header {
    text-align: center;
    padding: 100px 20px;
}

header img {
    width: 120px;
    border-radius: 50%;
    border: 3px solid #38bdf8;
}

/* Typing */
.typing {
    border-right: 2px solid;
    white-space: nowrap;
    overflow: hidden;
    display: inline-block;
    animation: typing 4s steps(30), blink .7s infinite;
}
@keyframes typing { from {width:0} to {width:260px} }
@keyframes blink { 50% {border-color:transparent} }

/* Sections */
section {
    max-width: 1000px;
    margin: auto;
    padding: 60px 20px;
}

/* Glass cards */
.card {
    background: var(--card);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 16px;
    margin: 15px 0;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.03);
}

/* Button */
.btn {
    background: linear-gradient(45deg,#38bdf8,#6366f1);
    padding: 10px 20px;
    border-radius: 6px;
    color: white;
    text-decoration: none;
}

/* Social */
.social i {
    margin: 10px;
    font-size: 22px;
    transition: 0.3s;
}
.social i:hover {
    color: #38bdf8;
}

/* Scroll animation */
.hidden {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<nav>
    <h3>Aditya</h3>
    <div>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
        🌙
        <span class="toggle" onclick="toggleMode()">🌓</span>
    </div>
</nav>

<header>
    <img src="https://via.placeholder.com/120">
    <h1>Hi, I'm Aditya 👋</h1>
    <p class="typing">CSE AI/ML Student | Developer 🚀</p>

    <br>
    <a href="#" class="btn">Download Resume</a>

    <div class="social">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </div>
</header>

<section id="about" class="hidden">
    <h2>About</h2>
    <div class="card">
        Passionate developer building modern web & AI solutions.
    </div>
</section>

<section id="skills" class="hidden">
    <h2>Skills</h2>
    <div class="card">Python</div>
    <div class="card">C</div>
    <div class="card">HTML CSS</div>
</section>

<section id="projects" class="hidden">
    <h2>Projects</h2>
    <div class="card">Gesture Control System</div>
    <div class="card">Portfolio Website</div>
</section>

<section id="contact" class="hidden">
    <h2>Contact</h2>
    <div class="card">your@email.com</div>
</section>

<script>
// Scroll animation
const observer = new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting) e.target.classList.add("show");
});
});
document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));

// Dark Light Mode
function toggleMode(){
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
