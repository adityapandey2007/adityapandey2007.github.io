<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Pandey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg:#0f172a;
    --text:#fff;
    --card:rgba(255,255,255,0.08);
}

.light {
    --bg:#f8fafc;
    --text:#0f172a;
    --card:rgba(0,0,0,0.05);
}

body{
    margin:0;
    font-family:-apple-system;
    background:var(--bg);
    color:var(--text);
}

/* PARTICLE BACKGROUND */
#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    backdrop-filter:blur(10px);
}

/* HERO */
#hero{
    text-align:center;
    padding:120px 20px;
}

/* PROFILE */
.profile-pic{
    width:220px;
    height:260px;
    border-radius:20px;
}

/* TYPING */
.typing{
    border-right:2px solid;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
    animation: typing 3s steps(30), blink .7s infinite;
}
@keyframes typing{from{width:0}to{width:250px}}
@keyframes blink{50%{border-color:transparent}}

/* BUTTON */
.btn{
    padding:10px 20px;
    background:linear-gradient(45deg,#38bdf8,#6366f1);
    border-radius:6px;
    color:white;
    text-decoration:none;
}

/* SMALL CURSOR GLOW */
.cursor-glow{
    position:fixed;
    width:50px;
    height:50px;
    background: radial-gradient(circle, rgba(255,0,150,0.5), transparent);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:9999;
}

/* SKILL BAR */
.skill{
    margin:15px 0;
}
.bar{
    height:10px;
    background:#333;
    border-radius:5px;
}
.fill{
    height:10px;
    background:#38bdf8;
    width:0;
    border-radius:5px;
    transition:1s;
}

/* CHATBOT */
.chatbot{
    position:fixed;
    bottom:20px;
    right:20px;
}
.chatbox{
    display:none;
    width:250px;
    background:#111;
    padding:10px;
}
</style>
</head>

<body>

<div id="particles-js"></div>
<div class="cursor-glow"></div>

<nav>
<h2>Aditya</h2>
<span onclick="toggleMode()">🌓</span>
</nav>

<header id="hero">
<img src="https://raw.githubusercontent.com/adityapandey2007/adityapandey2007.github.io/main/IMG_20260212_193928.jpg" class="profile-pic">

<h1>Aditya Pandey</h1>
<p class="typing">AI/ML Student | Developer 🚀</p>

<br>
<a href="#" class="btn">Resume</a>
</header>

<section>
<h2>Skills</h2>

<div class="skill">
Python
<div class="bar"><div class="fill" style="width:80%"></div></div>
</div>

<div class="skill">
HTML
<div class="bar"><div class="fill" style="width:70%"></div></div>
</div>

</section>

<!-- CHATBOT -->
<div class="chatbot">
<button onclick="toggleChat()">💬</button>
<div class="chatbox" id="chatbox">
<p>Hi 👋 Ask me anything!</p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
// DARK MODE
function toggleMode(){
    document.body.classList.toggle("light");
}

// CURSOR
const glow=document.querySelector(".cursor-glow");
document.addEventListener("mousemove",(e)=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

// SKILL ANIMATION
window.onload=()=>{
    document.querySelectorAll(".fill").forEach(el=>{
        el.style.width=el.style.width;
    });
};

// CHATBOT
function toggleChat(){
    const box=document.getElementById("chatbox");
    box.style.display = box.style.display==="block" ? "none" : "block";
}

// PARTICLES
particlesJS("particles-js",{
  particles:{
    number:{value:60},
    size:{value:3},
    move:{speed:2}
  }
});
</script>

</body>
</html>
