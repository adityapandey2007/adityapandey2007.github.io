<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Pandey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg:#0f172a;
    --text:#ffffff;
}

body{
    margin:0;
    font-family:-apple-system;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* 🌌 Cyberpunk Background */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#38bdf8,transparent),
                radial-gradient(circle,#6366f1,transparent);
    animation: move 12s infinite alternate;
    z-index:-2;
}

/* ⚡ Grid + scanline */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(0deg,rgba(0,255,255,0.05) 0px,rgba(0,255,255,0.05) 1px,transparent 1px,transparent 3px),
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:100% 100%,40px 40px,40px 40px;
    z-index:-1;
}

@keyframes move{
    50%{transform:translate(-150px,-150px);}
}

/* 🎯 HERO CENTER */
#hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* 📸 PROFILE */
.profile-wrapper{
    padding:12px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    margin-bottom:20px;

    animation: float 4s infinite ease-in-out, glow 3s infinite;
}

.profile-pic{
    width:230px;
    border-radius:18px;
}

@keyframes float{
    50%{transform:translateY(-10px);}
}

@keyframes glow{
    50%{box-shadow:0 0 35px #a855f7;}
}

/* ⚡ NAME GLOW */
.gradient-text{
    font-size:52px;
    color:#fff;
    text-shadow:
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 40px #f0f;
}

/* 📄 BUTTON */
.btn{
    margin-top:20px;
    padding:14px 30px;
    font-size:16px;
    background:linear-gradient(45deg,#38bdf8,#6366f1);
    border-radius:8px;
    color:white;
    text-decoration:none;
    box-shadow:0 0 20px #6366f1;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px #a855f7;
}
</style>
</head>

<body>

<header id="hero">

<div class="profile-wrapper">
<img src="https://raw.githubusercontent.com/adityapandey2007/adityapandey2007.github.io/main/IMG_20260212_193928.jpg" class="profile-pic">
</div>

<h1 class="gradient-text">Aditya Pandey</h1>

<a href="#" class="btn">Download Resume</a>

</header>

</body>
</html>
