<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Pandey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #0f172a;
    --text: #fff;
    --card: rgba(255,255,255,0.08);
}

.light {
    --bg: #f8fafc;
    --text: #0f172a;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* 🔥 LOADING SCREEN */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
.loader-text {
    font-size: 24px;
    letter-spacing: 3px;
    animation: blink 1s infinite;
}
@keyframes blink { 50% {opacity: 0.3;} }

/* 🌊 Animated BG */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#38bdf8,transparent),
                radial-gradient(circle,#6366f1,transparent);
    animation: moveBg 12s infinite alternate;
    z-index:-1;
}
@keyframes moveBg {
    to {transform: translate(-150px,-150px);}
}

/* NAV */
nav {
    display:flex;
    justify-content:space-between;
    padding:20px;
    backdrop-filter: blur(12px);
}

/* HERO */
header {
    text-align:center;
    padding:100px 20px;
}

header img {
    width:120px;
    border-radius:50%;
}

/* GLASS */
.card {
    background: var(--card);
    backdrop-filter: blur(15px);
    padding:20px;
    border-radius:15px;
    margin:15px 0;
    transition:0.4s;
}

/* 🔥 3D HOVER */
.card:hover {
    transform: rotateX(5deg) rotateY(5deg) scale(1.05);
}

/* CURSOR */
.cursor {
    width:20px;
    height:20px;
    border:2px solid #38bdf8;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
}

/* BUTTON */
.btn {
    padding:10px 20px;
    background:linear-gradient(45deg,#38bdf8,#6366f1);
    border-radius:6px;
    text-decoration:none;
    color:white;
}

/* SOCIAL */
.social i {
    margin:10px;
    font-size:22px;
}

/* SECTIONS */
section {
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-text">LOADING...</div>
</div>

<!-- CURSOR -->
<div class="cursor"></div>

<nav>
    <h3>Aditya</h3>
    <span onclick="toggleMode()">🌓</span>
</nav>

<header>
    <img src="https://via.placeholder.com/120">
    <h1>Aditya Pandey</h1>
    <p>CSE AI/ML Student 🚀</p>
    <a href="#" class="btn">Resume</a>

    <div class="social">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-github"></i>
    </div>
</header>

<section>
    <div class="card">About: Passionate developer</div>
    <div class="card">Skills: Python, C, Web</div>
    <div class="card">Projects: Gesture Control System</div>
    <div class="card">Contact: your@email.com</div>
</section>

<script>
// LOADER
window.onload = () => {
    document.getElementById("loader").style.display = "none";
};

// CURSOR
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

// DARK MODE
function toggleMode(){
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
