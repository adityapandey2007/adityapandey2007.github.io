<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Pandey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- 🔥 THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
:root {
    --bg:#0f172a;
    --text:#ffffff;
}

body{
    margin:0;
    font-family:-apple-system;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* 🎮 3D CANVAS */
#bg-canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    position:sticky;
    top:0;
    backdrop-filter:blur(10px);
}

/* HERO */
#hero{
    text-align:center;
    padding:120px 20px;
}

/* PROFILE */
.profile-wrapper{
    display:inline-block;
    padding:12px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    animation:float 4s infinite ease-in-out;
}

.profile-pic{
    width:200px;
    border-radius:16px;
}

/* FLOAT */
@keyframes float{
    50%{transform:translateY(-10px);}
}

/* NAME */
.gradient-text{
    font-size:50px;
    color:#fff;
    text-shadow:0 0 20px #0ff,0 0 40px #f0f;
}

/* BUTTON */
.btn{
    padding:12px 25px;
    background:linear-gradient(45deg,#38bdf8,#6366f1);
    border-radius:6px;
    color:white;
    text-decoration:none;
}

/* AI CHAT */
.chatbot{
    position:fixed;
    bottom:20px;
    right:20px;
}

.chatbox{
    display:none;
    width:250px;
    background:#111;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<nav>
<h2>Aditya</h2>
</nav>

<header id="hero">

<div class="profile-wrapper">
<img src="https://raw.githubusercontent.com/adityapandey2007/adityapandey2007.github.io/main/IMG_20260212_193928.jpg" class="profile-pic">
</div>

<h1 class="gradient-text">Aditya Pandey</h1>
<p id="typing"></p>

<a href="#" class="btn">Download Resume</a>

</header>

<!-- 🤖 CHATBOT -->
<div class="chatbot">
<button onclick="toggleChat()">🤖</button>
<div class="chatbox" id="chatbox">
<p>Hello! I'm your AI assistant 👋</p>
</div>
</div>

<script>
// 🎮 THREE JS BACKGROUND
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg-canvas")});
renderer.setSize(window.innerWidth,window.innerHeight);

const geometry = new THREE.TorusGeometry(10,3,16,100);
const material = new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true});
const torus = new THREE.Mesh(geometry,material);

scene.add(torus);
camera.position.z=30;

function animate(){
requestAnimationFrame(animate);
torus.rotation.x+=0.01;
torus.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

// TYPING
let text="AI/ML Developer 🚀";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text[i++];
setTimeout(type,50);
}}
type();

// CHATBOT
function toggleChat(){
let box=document.getElementById("chatbox");
box.style.display=box.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
